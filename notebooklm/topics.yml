topics:
  - id: agent-systems-core
    title: "Agent Systems: Core Mental Model"
    focus: "Baseline ideas before MAS, harnesses, skills, and protocols."
    podcast_angle: "Explain the core design pressure behind agents: computation, tool-use, workflows, and system architecture."
    questions:
      - "What separates an agent from a workflow?"
      - "Why does tool design matter as much as prompting?"
      - "How does the Bitter Lesson constrain agent-system design?"
    sources:
      - note: "sources/Rich Sutton The Bitter Lesson.md"
        why: "Sets the compute/search prior that should discipline agent architecture claims."
      - note: "sources/Anthropic Building Effective Agents.md"
        why: "Clean practical distinction between workflows and more autonomous agents."
      - note: "sources/AI Agent Systems - Architectures Applications and Evaluation.md"
        why: "Broad survey of agent architectures, applications, and evaluation issues."
      - note: "sources/Agentic Large Language Models - A Survey.md"
        why: "Conceptual grounding for agentic LLMs as systems that reason, act, and interact."
      - note: "sources/Anthropic Writing Tools for Agents.md"
        why: "Foundational practical article on making tools legible and effective for agents."

  - id: mas-architecture-scaling
    title: "MAS Architecture and Scaling"
    focus: "When multi-agent systems help, when they hurt, and what coordination structures matter."
    podcast_angle: "Contrast naive 'more agents' thinking with task-structure-aware orchestration."
    questions:
      - "Which task structures benefit from multiple agents?"
      - "What does an orchestration control plane do?"
      - "When is a central orchestrator the right architecture?"
    sources:
      - note: "sources/Multi-Agent Collaboration Mechanisms - A Survey of LLMs.md"
        why: "Gives the collaboration vocabulary and taxonomy."
      - note: "sources/Google Scaling Agent Systems.md"
        why: "Strong corrective to the assumption that more agents are always better."
      - note: "sources/The Orchestration of Multi-Agent Systems.md"
        why: "Frames orchestration as the control plane for multi-agent systems."
      - note: "sources/Anthropic Multi-Agent Research System.md"
        why: "Canonical production orchestrator-worker example."
      - note: "sources/Magentic-One.md"
        why: "Important specialist-agent orchestration prelude."
      - note: "sources/Google ADK Multi-Agent Patterns.md"
        why: "Practical implementation patterns for production agent teams."

  - id: mas-failure-modes
    title: "MAS Failure Modes"
    focus: "Why multi-agent systems break, underperform, or waste tokens."
    podcast_angle: "Make the failure modes concrete: misalignment, bad verification, architecture overhead, and expertise dilution."
    questions:
      - "What are the recurring failure modes in MAS traces?"
      - "How can team structure dilute rather than amplify expertise?"
      - "How do routing, dropout, and supervision reduce waste?"
    sources:
      - note: "sources/Why Do Multi-Agent LLM Systems Fail.md"
        why: "Core failure taxonomy from annotated multi-agent traces."
      - note: "sources/MultiAgentBench.md"
        why: "Benchmark for collaboration and competition with topology comparisons."
      - note: "sources/Understanding Multi-Agent LLM Frameworks.md"
        why: "Shows framework architecture can dominate latency and coordination quality."
      - note: "sources/Multi-Agent Teams Hold Experts Back.md"
        why: "Corrective paper on teams compromising away expert answers."
      - note: "sources/Stop Wasting Your Tokens.md"
        why: "Runtime supervisor pattern for reducing propagation and token waste."
      - note: "sources/AgentDropout.md"
        why: "Dynamic pruning of redundant agents and communications."

  - id: workflow-topology-search
    title: "Workflow and Topology Search"
    focus: "Agent-system structure as something to search, learn, or optimize."
    podcast_angle: "Explain the frontier move from hand-designed workflows to automated workflow, prompt, topology, and routing optimization."
    questions:
      - "What parts of an agent system can be optimized?"
      - "How do workflow search and topology search differ?"
      - "How should routing and model assignment be treated?"
    sources:
      - note: "sources/ADAS.md"
        why: "Foundational paper on automated design of agentic systems."
      - note: "sources/AFlow.md"
        why: "Searches code-represented agent workflows."
      - note: "sources/Multi-Agent Design - MASS.md"
        why: "Treats prompts and communication topology as co-optimized variables."
      - note: "sources/MAPRO.md"
        why: "Topology-aware multi-agent prompt optimization."
      - note: "sources/MasRouter.md"
        why: "Routes collaboration mode, role allocation, and model choice."
      - note: "sources/AgentNet.md"
        why: "Decentralized dynamic coordination alternative to central control."

  - id: planner-executor-verifier
    title: "Planner-Executor-Verifier and Deliberation"
    focus: "Explicit planning, execution, verification, and repair loops."
    podcast_angle: "Trace the deliberator idea from classic robotics to modern planner-executor-verifier agent systems."
    questions:
      - "What work belongs in the planner, executor, verifier, and coordinator?"
      - "Why does explicit verification help long-horizon agents?"
      - "Why can the planner become a privileged attack surface?"
    sources:
      - note: "sources/On Three-Layer Architectures.md"
        why: "Historical root of deliberator/executive/reactive separation."
      - note: "sources/Plan-Then-Execute.md"
        why: "Human trust study for plan-then-execute agents."
      - note: "sources/SAND.md"
        why: "Self-taught action deliberation for LLM agents."
      - note: "sources/VeriMAP.md"
        why: "Planner-executor-verifier MAS with generated verification functions."
      - note: "sources/AgentFlow.md"
        why: "Planner/executor/verifier/generator loop optimized in-flow."
      - note: "sources/PEAR.md"
        why: "Security benchmark showing planner-stage attacks are dangerous."
      - note: "sources/Web Agents Plan-Then-Execute.md"
        why: "Web-agent case for planning before observing untrusted content."

  - id: agent-teams-workforces
    title: "Agent Teams and Workforces"
    focus: "Agent teams as organizational systems with roles, context, ownership, and verification."
    podcast_angle: "Separate generic MAS from real teams: teammates, responsibilities, shared state, and definitions of done."
    questions:
      - "What makes an agent team different from subagent delegation?"
      - "How do leader/worker/verifier systems close the quality loop?"
      - "Where do human managers belong in agent teams?"
    sources:
      - note: "sources/Anthropic Multi-Agent Coordination Patterns.md"
        why: "Defines when to use teams versus subagents and shared state."
      - note: "sources/Claude Code Agent Teams.md"
        why: "Concrete documentation for independent agent teammates."
      - note: "sources/MiniMax Agent Team.md"
        why: "Production Leader/Worker/Verifier team-engine article."
      - note: "sources/Agyn.md"
        why: "Team-based autonomous software engineering system."
      - note: "sources/ChatDev.md"
        why: "Virtual software-company prelude."
      - note: "sources/MetaGPT.md"
        why: "SOP-style multi-agent software-team framework."
      - note: "sources/Orchestrating Human-AI Teams.md"
        why: "Manager-agent framing for human-AI teams."

  - id: agent-harnesses-runtime
    title: "Agent Harnesses and Runtime"
    focus: "The execution scaffold around models: loop, tools, state, sandbox, approvals, traces, compaction, and resumption."
    podcast_angle: "Define harnesses as the runtime that turns model calls into acting systems."
    questions:
      - "Where does the agent loop live?"
      - "How do context, tools, sandboxing, and approvals interact?"
      - "Why is resumability a runtime concern rather than a prompt concern?"
    sources:
      - note: "sources/OpenAI Codex Agent Loop.md"
        why: "Clearest public production explanation of a coding-agent loop."
      - note: "sources/Anthropic Effective Harnesses for Long-Running Agents.md"
        why: "Long-running handoff pattern across context windows."
      - note: "sources/Anthropic Harness Design Long-Running Apps.md"
        why: "Planner/generator/evaluator harness for long-running app development."
      - note: "sources/Anthropic Managed Agents.md"
        why: "Managed runtime architecture separating session, harness, and sandbox."
      - note: "sources/OpenClaw Agent Harness Plugins.md"
        why: "Clean definition of the harness as low-level executor."
      - note: "sources/Ralph Playbook.md"
        why: "Fresh-context coding loop pattern."
      - note: "sources/OpenAI Running Codex Safely.md"
        why: "Sandboxing, permissions, and telemetry as harness controls."

  - id: context-management-compaction
    title: "Context Management and Compaction"
    focus: "Compaction as architecture: summarize, mask, clear, retrieve, prune, offload, isolate, or hand off."
    podcast_angle: "Explain why compaction is not one technique and why lost context can break agents."
    questions:
      - "When should an agent summarize, mask, clear, retrieve, or hand off?"
      - "What is the difference between prompt compression and agent context compaction?"
      - "How do coding agents preserve exact details?"
    sources:
      - note: "sources/Anthropic Effective Context Engineering.md"
        why: "Practical baseline for context engineering."
      - note: "sources/Anthropic Context Engineering Cookbook.md"
        why: "Direct comparison of compaction, tool-result clearing, and memory."
      - note: "sources/The Complexity Trap.md"
        why: "Formal comparison of observation masking versus summarization."
      - note: "sources/ACON.md"
        why: "Agent-specific context compression for long-horizon tasks."
      - note: "sources/Factory Context Compression Evaluation.md"
        why: "Production comparison of compression strategies."
      - note: "sources/SWE-Pruner.md"
        why: "Task-aware code-context pruning for coding agents."
      - note: "sources/ContextBench.md"
        why: "Benchmark for context retrieval in coding agents."
      - note: "sources/Amp Handoff.md"
        why: "Handoff as an alternative to repeated compaction."

